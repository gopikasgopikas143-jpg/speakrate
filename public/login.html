<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakRate — Sign In</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="screen">
  <div class="card">
    <h1>🎙️ SpeakRate</h1>
    <p class="subtitle" id="mode-subtitle">Sign in to your account</p>

    <div id="name-field" class="hidden">
      <input id="name-input" type="text" placeholder="Your full name" maxlength="40">
    </div>
    <input id="email-input" type="email" placeholder="Email">
    <input id="password-input" type="password" placeholder="Password">

    <button id="submit-btn">Sign In</button>

    <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
      <hr style="flex:1;border-color:#3a3a5a;"><span class="hint" style="margin:0;">or</span><hr style="flex:1;border-color:#3a3a5a;">
    </div>

    <button id="google-btn" style="background:#fff;color:#1a1a2e;display:flex;align-items:center;justify-content:center;gap:10px;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.9-2.26 5.36-4.78 7.02l7.73 6c4.51-4.18 7.09-10.36 7.09-17.49z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>

    <p class="hint" id="error-msg" style="color:#ff6b6b;"></p>

    <p class="hint">
      <span id="toggle-text">Don't have an account?</span>
      <a href="#" id="toggle-link" style="color:#a29bfe;">Sign up</a>
    </p>
  </div>
</div>

<script src="/config.js"></script>
<script src="auth.js"></script>
</body>
</html>
